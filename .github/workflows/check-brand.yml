name: Brand guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-brand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Verificar nome de marca e domínio canônico
        run: bun run check:brand
